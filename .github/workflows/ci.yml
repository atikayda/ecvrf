name: ECVRF Cross-Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  oracle-drift:
    name: Oracle drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install -r python/requirements.txt
      - name: Validate oracle against P-256 RFC vectors
        working-directory: python
        run: python ecvrf.py
      - name: Regenerate vectors and diff
        run: |
          cd python
          python generate.py
          cd ..
          git diff --exit-code vectors/vectors.json

  python:
    name: Python oracle self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r python/requirements.txt
      - name: Validate P-256 vectors
        working-directory: python
        run: python ecvrf.py

  go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Run tests
        working-directory: go
        run: go test -v -count=1 ./...
      - name: Build CLI
        run: |
          cd go
          go build -o ecvrf-go ./cmd/ecvrf-cli
      - uses: actions/upload-artifact@v4
        with:
          name: cli-go
          path: go/ecvrf-go
          retention-days: 1

  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Run tests
        working-directory: rust
        run: cargo test --release -- --nocapture
      - name: Build CLI
        working-directory: rust
        run: cargo build --example cli --release
      - uses: actions/upload-artifact@v4
        with:
          name: cli-rust
          path: rust/target/release/examples/cli
          retention-days: 1

  typescript:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install deps
        working-directory: typescript
        run: npm ci
      - name: Build and test
        working-directory: typescript
        run: npm test
      - name: Stage TypeScript CLI artifact
        run: |
          mkdir -p ts-cli-out/dist
          cp scripts/node-cli.mjs ts-cli-out/
          cp -r typescript/dist/* ts-cli-out/dist/
      - uses: actions/upload-artifact@v4
        with:
          name: cli-typescript
          path: ts-cli-out/
          retention-days: 1

  c:
    name: C tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Build and test
        working-directory: c
        run: make test
      - name: Build CLI
        working-directory: c
        run: make ecvrf_cli
      - uses: actions/upload-artifact@v4
        with:
          name: cli-c
          path: c/ecvrf_cli
          retention-days: 1

  csharp:
    name: C# tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Run tests
        working-directory: csharp
        run: dotnet test
      - name: Publish CLI
        working-directory: csharp/Ecvrf.Cli
        run: dotnet publish -c Release -o ../../cli-csharp-out
      - uses: actions/upload-artifact@v4
        with:
          name: cli-csharp
          path: cli-csharp-out/
          retention-days: 1

  kotlin:
    name: Kotlin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Run tests
        working-directory: kotlin
        run: gradle test
      - name: Build distribution
        working-directory: kotlin
        run: gradle installDist
      - uses: actions/upload-artifact@v4
        with:
          name: cli-kotlin
          path: kotlin/build/install/ecvrf-kotlin/
          retention-days: 1

  haskell:
    name: Haskell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10"
          cabal-version: latest
      - name: Build and test
        working-directory: haskell
        run: |
          cabal update
          cabal build all --enable-tests
          cabal test --test-show-details=direct
      - name: Copy CLI binary
        run: |
          mkdir -p haskell-cli-out
          cp "$(cd haskell && cabal list-bin ecvrf-cli)" haskell-cli-out/ecvrf-cli
      - uses: actions/upload-artifact@v4
        with:
          name: cli-haskell
          path: haskell-cli-out/ecvrf-cli
          retention-days: 1

  zig:
    name: Zig tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Run tests
        working-directory: zig
        run: zig build test
      - name: Build CLI
        working-directory: zig
        run: zig build -Doptimize=ReleaseFast
      - uses: actions/upload-artifact@v4
        with:
          name: cli-zig
          path: zig/zig-out/bin/ecvrf-cli
          retention-days: 1

  swift:
    name: Swift tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        working-directory: swift
        run: |
          swift build
          swift run ecvrf-test

  solidity:
    name: Solidity tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install dependencies
        working-directory: solidity
        run: |
          git init
          forge install foundry-rs/forge-std --no-git
      - name: Run tests
        working-directory: solidity
        run: forge test

  solana:
    name: Solana tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: solana
      - name: Run tests
        working-directory: solana
        run: cargo test
      - name: Build CLI
        working-directory: solana
        run: cargo build --example cli --features no-entrypoint --release
      - uses: actions/upload-artifact@v4
        with:
          name: cli-solana
          path: solana/target/release/examples/cli
          retention-days: 1

  cross-validate:
    name: Cross-implementation validation
    needs: [python, go, rust, typescript, c, csharp, kotlin, haskell, zig, swift, solidity, solana]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Download all pre-built CLI artifacts
      - uses: actions/download-artifact@v4
        with:
          name: cli-go
          path: artifacts/go
      - uses: actions/download-artifact@v4
        with:
          name: cli-rust
          path: artifacts/rust
      - uses: actions/download-artifact@v4
        with:
          name: cli-typescript
          path: artifacts/typescript
      - uses: actions/download-artifact@v4
        with:
          name: cli-c
          path: artifacts/c
      - uses: actions/download-artifact@v4
        with:
          name: cli-csharp
          path: artifacts/csharp
      - uses: actions/download-artifact@v4
        with:
          name: cli-kotlin
          path: artifacts/kotlin
      - uses: actions/download-artifact@v4
        with:
          name: cli-haskell
          path: artifacts/haskell
      - uses: actions/download-artifact@v4
        with:
          name: cli-zig
          path: artifacts/zig
      - uses: actions/download-artifact@v4
        with:
          name: cli-solana
          path: artifacts/solana

      # Runtimes needed: Python (orchestrator + python CLI), Node (TS CLI),
      # .NET (C# CLI), JRE (Kotlin CLI), Foundry (Solidity CLI)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: foundry-rs/foundry-toolchain@v1

      - name: Install Python deps
        run: pip install -r python/requirements.txt
      - name: Install Solidity dependencies
        working-directory: solidity
        run: |
          git init
          forge install foundry-rs/forge-std --no-git

      - name: Install TypeScript runtime deps
        working-directory: typescript
        run: npm ci
      - name: Link TypeScript deps to artifact
        run: ln -s "${{ github.workspace }}/typescript/node_modules" artifacts/typescript/node_modules

      - name: Run cross-validation
        env:
          ECVRF_BIN_DIR: ${{ github.workspace }}/artifacts
        run: bash scripts/cross-validate.sh
