name: ECVRF Cross-Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  oracle-drift:
    name: Oracle drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: pip install -r python/requirements.txt
      - name: Validate oracle against P-256 RFC vectors
        working-directory: python
        run: python ecvrf.py
      - name: Regenerate vectors and diff
        run: |
          cd python
          python generate.py
          cd ..
          git diff --exit-code vectors/vectors.json

  python:
    name: Python oracle self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r python/requirements.txt
      - name: Validate P-256 vectors
        working-directory: python
        run: python ecvrf.py

  go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Run tests
        working-directory: go
        run: go test -v -count=1 ./...

  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Run tests
        working-directory: rust
        run: cargo test --release -- --nocapture

  typescript:
    name: TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install deps
        working-directory: typescript
        run: npm ci
      - name: Build and test
        working-directory: typescript
        run: npm test

  c:
    name: C tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Build and test
        working-directory: c
        run: make test

  csharp:
    name: C# tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Run tests
        working-directory: csharp
        run: dotnet test

  kotlin:
    name: Kotlin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Run tests
        working-directory: kotlin
        run: gradle test

  haskell:
    name: Haskell tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: latest
          cabal-version: latest
      - name: Build and test
        working-directory: haskell
        run: |
          cabal update
          cabal build all --enable-tests
          cabal test --test-show-details=direct

  zig:
    name: Zig tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0
      - name: Run tests
        working-directory: zig
        run: zig build test

  swift:
    name: Swift tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        working-directory: swift
        run: |
          swift build
          swift run ecvrf-test

  solidity:
    name: Solidity tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install dependencies
        working-directory: solidity
        run: forge install
      - name: Run tests
        working-directory: solidity
        run: forge test

  solana:
    name: Solana tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: solana
      - name: Run tests
        working-directory: solana
        run: cargo test

  cross-validate:
    name: Cross-implementation validation
    needs: [python, go, rust, typescript, c, csharp, kotlin, haskell, zig, swift, solidity, solana]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install Python deps
        run: pip install -r python/requirements.txt
      - name: Install TypeScript deps
        working-directory: typescript
        run: npm ci
      - name: Build TypeScript
        working-directory: typescript
        run: npm run build
      - name: Run cross-validation
        run: bash scripts/cross-validate.sh
